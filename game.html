<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <title>打地鼠遊戲</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
        .game-container {
            margin: 20px auto;
            width: 400px;
        }
        .holes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .hole {
            width: 100px;
            height: 100px;
            margin: 10px;
            background-color: #8B4513;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        .mole {
            width: 80px;
            height: 80px;
            position: absolute;
            bottom: -80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            transition: bottom 0.3s ease;
        }
        .score {
            font-size: 24px;
            margin: 20px;
        }
        .hole.up .mole {
            display: block;
            bottom: 0;
        }
    </style>
</head>
<body>
    <h1>打地鼠遊戲</h1>
    <div class="score">分數: <span id="score">0</span></div>
    <div class="game-container">
        <div class="holes">
            <div class="hole" id="hole1">
                <div class="mole" id="mole1">🐭</div>
            </div>
            <div class="hole" id="hole2">
                <div class="mole" id="mole2">🐭</div>
            </div>
            <div class="hole" id="hole3">
                <div class="mole" id="mole3">🐭</div>
            </div>
            <div class="hole" id="hole4">
                <div class="mole" id="hole4">
                    <div class="mole" id="mole4"></div>
                </div>
            </div>
            <div class="hole" id="hole5">
                <div class="mole" id="mole4">🐭</div>
            </div>
            <div class="hole" id="hole6">
                <div class="mole" id="mole6">🐭</div>
            </div>
        </div>
    </div>
    <button id="start">開始遊戲</button>
    <br><br>
    <a href="index.html">返回首頁</a>
    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('start');
        let score = 0;
        let timeUp = false;
        let lastHole;

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(200, 1000);
            const hole = randomHole(holes);
            hole.classList.add('up');
            setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            score = 0;
            scoreDisplay.textContent = 0;
            timeUp = false;
            peep();
            setTimeout(() => timeUp = true, 10000);
        }

        function bonk(e) {
            if (!e.isTrusted) return; // 防止作弊
            score++;
            this.classList.remove('up');
            scoreDisplay.textContent = score;
        }

        moles.forEach(mole => mole.addEventListener('click', bonk));

        startButton.addEventListener('click', startGame);
    </script>
</body>
</html>
